# Sources for the daily pull. mailto is the OpenAlex/Crossref polite-pool
# address — public, not a secret.
title: "Paper Feeder"
link: ""                    # set to the published Pages URL once known
mailto: ajr225@gmail.com
lookback_days: 2           # how far back API queries reach (RSS is inherently recent)
retention_days: 180        # prune seen.json entries older than this

rss:
  - {name: nature, url: "https://www.nature.com/nature.rss"}
  - {name: science, url: "https://www.science.org/rss/news_current.xml"}
  - {name: tc, url: "https://tc.copernicus.org/xml/rss2_0.xml", journal: "The Cryosphere"}
  - {name: cp, url: "https://cp.copernicus.org/xml/rss2_0.xml", journal: "Climate of the Past"}
  - {name: arxiv-ao-ph, url: "http://arxiv.org/rss/physics.ao-ph", journal: "arXiv physics.ao-ph"}

openalex:
  # filter is an OpenAlex works filter; from_publication_date is added at runtime.
  # Look up topic IDs at https://api.openalex.org/topics?search=... and replace.
  queries:
    - {name: ice-sheets, filter: "primary_topic.id:T10744"}
  issns:
    - "1758-678X"          # Nature Climate Change
    - "0027-8424"          # PNAS

crossref:
  issns: []                # fallback only, for journals OpenAlex indexes poorly
