# Copy this into YOUR site repo at .github/workflows/scan.yml.
# It runs the paper-feeder digest daily and commits the result back.
name: scan

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # One step does the work: install paper-feeder, score, write feed/.
      - uses: alex-robinson/paper-feeder@v0.1.0
        with:
          config: config
          data: data          # on a Jekyll site, use a dot-dir (e.g. .paper-feeder) so state isn't published
          docs: feed          # published subdir -> <site>/feed/ and <site>/feed/feed.xml

      - name: Commit results
        run: |
          git config user.name  "paper-feeder"
          git config user.email "actions@github.com"
          git add feed/ data/
          git diff --staged --quiet || git commit -m "scan: $(date -I)"
          git push

